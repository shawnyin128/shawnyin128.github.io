#-------------------------------
# Research Interests Settings
interests_settings:
  enable: true
  title: Research Interests
  description:
  figure:                                    # leave blank to render items only (no figure column)
  figure_caption:                            # optional caption under the figure
  items:
    - title: Representation Learning
      icon: 'fa-solid fa-fingerprint'
      description: Studying what makes a visual representation universal, useful, and "good".
      sub_items:
        - Vision
        - Multimodal
        - Embodied
    - title: AI Efficiency
      icon: 'fa-solid fa-bolt'
      description: Hardware-software co-design across speculative decoding, quantization, and pruning.
      sub_items:
        - Quantization
        - Speculative Decoding
        - Pruning
    - title: Agents
      icon: 'fa-solid fa-robot'
      description: Building agent tooling and constructing benchmarks for evaluating agent capabilities.
      sub_items:
        - Benchmark
        - Tool
        - Application


